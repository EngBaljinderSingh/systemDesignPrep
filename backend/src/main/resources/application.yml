# ═══════════════════════════════════════════════
# System Design Prep — Application Configuration
# ═══════════════════════════════════════════════

spring:
  application:
    name: sdp-backend

  # ── Database ──
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/systemdesignprep}
    username: ${SPRING_DATASOURCE_USERNAME:sdp_user}
    password: ${SPRING_DATASOURCE_PASSWORD:sdp_local_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Redis ──
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false

# ── Actuator / Observability ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# ── Server ──
server:
  port: ${PORT:8080}
  shutdown: graceful

# ── AI Configuration ──
ai:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
    model: ${OLLAMA_MODEL:llama3.2:1b}

# ── Logging ──
logging:
  level:
    com.systemdesignprep: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
