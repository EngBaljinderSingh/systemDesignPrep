services:
  # ──────────────────────────────────────────────
  # Backend — Spring Boot 3 (Hexagonal)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/systemdesignprep
      SPRING_DATASOURCE_USERNAME: sdp_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-sdp_local_pass}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - sdp-network

  # ──────────────────────────────────────────────
  # Frontend — React 18 + TypeScript
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    networks:
      - sdp-network

  # ──────────────────────────────────────────────
  # Ollama — local LLM (free, last-resort fallback)
  # ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - sdp-network

  # ──────────────────────────────────────────────
  # PostgreSQL (mirrors Supabase in production)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: systemdesignprep
      POSTGRES_USER: sdp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sdp_local_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdp_user -d systemdesignprep"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdp-network

  # ──────────────────────────────────────────────
  # Redis (Session + Cache)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdp-network

  # ──────────────────────────────────────────────
  # Observability — Prometheus
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    networks:
      - sdp-network

  # ──────────────────────────────────────────────
  # Observability — Grafana
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
    networks:
      - sdp-network

  # ──────────────────────────────────────────────
  # Piston — self-hosted sandboxed code execution
  # ──────────────────────────────────────────────
  piston:
    image: ghcr.io/engineer-man/piston
    privileged: true
    tmpfs:
      - /piston/jobs
    ports:
      - "2000:2000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/api/v2/runtimes"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - sdp-network

  # Installs language runtimes into Piston on first start
  piston-init:
    image: alpine:3.19
    restart: on-failure:5
    depends_on:
      piston:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl jq > /dev/null 2>&1

        echo "Querying Piston package registry..."
        PKGS=$$(curl -sf http://piston:2000/api/v2/packages)
        if [ -z "$$PKGS" ]; then
          echo "ERROR: Piston returned empty response. Check internet access."
          exit 1
        fi
        CNT=$$(echo "$$PKGS" | jq length 2>/dev/null || echo 0)
        echo "Found $$CNT packages in registry"
        if [ "$$CNT" = "0" ]; then
          echo "ERROR: No packages found in registry."
          exit 1
        fi

        install_pkg() {
          NAME="$$1"
          VER=$$(echo "$$PKGS" | jq -r --arg n "$$NAME" '[.[] | select(.language == $$n)] | .[0] | .language_version // empty')
          if [ -z "$$VER" ]; then
            echo "SKIP: '$$NAME' not found in registry"
            return 1
          fi
          echo "Installing $$NAME@$$VER ..."
          RES=$$(curl -sS -m 300 -X POST http://piston:2000/api/v2/packages \
            -H 'Content-Type: application/json' \
            -d '{"language":"'"$$NAME"'","version":"'"$$VER"'"}' 2>&1)
          echo "  -> $$RES"
          return 0
        }

        install_pkg python
        install_pkg javascript || install_pkg node
        install_pkg typescript
        install_pkg java
        install_pkg go
        install_pkg mono

        echo "Piston runtime installation complete."
        echo "Installed: $$(curl -sf http://piston:2000/api/v2/runtimes | jq -r '[.[].language] | join(", ")')"
    networks:
      - sdp-network

volumes:
  pgdata:
    driver: local
  ollama-data:
    driver: local

networks:
  sdp-network:
    driver: bridge
